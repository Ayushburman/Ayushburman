<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #050a0f; }
      .scan {
        fill: none;
        stroke: #00ff88;
        stroke-width: 0.4;
        opacity: 0.08;
      }
      .grid-line { stroke: #0a2a1a; stroke-width: 0.5; opacity: 0.6; }

      .star { fill: #ffffff; animation: twinkle 3s infinite alternate; }
      .star:nth-child(2n) { animation-duration: 2.1s; animation-delay: 0.4s; }
      .star:nth-child(3n) { animation-duration: 4.2s; animation-delay: 1.1s; }
      .star:nth-child(5n) { animation-duration: 2.8s; animation-delay: 0.7s; }

      @keyframes twinkle {
        0% { opacity: 0.1; }
        100% { opacity: 0.9; }
      }

      .title {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 42px;
        fill: #00ff88;
        letter-spacing: 8px;
        filter: url(#glow);
        animation: flicker 5s infinite;
      }
      .subtitle {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #33cc77;
        letter-spacing: 4px;
      }
      .label {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px;
        fill: #1a6640;
        letter-spacing: 2px;
      }
      .coord {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #00cc66;
        letter-spacing: 3px;
        opacity: 0.7;
      }
      .redacted {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #003311;
        letter-spacing: 1px;
      }
      .status-dot {
        fill: #00ff88;
        animation: pulse 1.8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; r: 4; }
        50% { opacity: 0.3; r: 3; }
      }
      @keyframes flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.4; }
        97% { opacity: 0.9; }
        98% { opacity: 0.2; }
        99% { opacity: 0.8; }
      }

      .scanline {
        fill: none;
        stroke: #00ff88;
        stroke-width: 1;
        opacity: 0.06;
        animation: scan-move 6s linear infinite;
      }
      @keyframes scan-move {
        0% { transform: translateY(-280px); }
        100% { transform: translateY(280px); }
      }

      .signal-bar {
        fill: #00ff88;
        animation: signal 2s ease-in-out infinite alternate;
      }
      .signal-bar:nth-child(1) { animation-delay: 0s; }
      .signal-bar:nth-child(2) { animation-delay: 0.15s; }
      .signal-bar:nth-child(3) { animation-delay: 0.3s; }
      .signal-bar:nth-child(4) { animation-delay: 0.45s; }
      .signal-bar:nth-child(5) { animation-delay: 0.6s; }
      @keyframes signal {
        0% { opacity: 0.2; }
        100% { opacity: 1; }
      }

      .border-line { stroke: #00ff88; stroke-width: 0.8; opacity: 0.4; fill: none; }
      .corner-mark { stroke: #00ff88; stroke-width: 1.5; fill: none; opacity: 0.8; }
      .blink { animation: blink-anim 1.1s step-end infinite; }
      @keyframes blink-anim {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg"/>

  <!-- Subtle grid -->
  <line x1="0" y1="70" x2="900" y2="70" class="grid-line"/>
  <line x1="0" y1="140" x2="900" y2="140" class="grid-line"/>
  <line x1="0" y1="210" x2="900" y2="210" class="grid-line"/>
  <line x1="225" y1="0" x2="225" y2="280" class="grid-line"/>
  <line x1="450" y1="0" x2="450" y2="280" class="grid-line"/>
  <line x1="675" y1="0" x2="675" y2="280" class="grid-line"/>

  <!-- Scanline moving -->
  <line x1="0" y1="0" x2="900" y2="0" class="scanline"/>

  <!-- Stars -->
  <circle cx="23" cy="19" r="1" class="star"/>
  <circle cx="78" cy="43" r="0.7" class="star"/>
  <circle cx="140" cy="11" r="1.2" class="star"/>
  <circle cx="190" cy="58" r="0.6" class="star"/>
  <circle cx="267" cy="22" r="0.9" class="star"/>
  <circle cx="334" cy="47" r="0.7" class="star"/>
  <circle cx="410" cy="8" r="1.1" class="star"/>
  <circle cx="488" cy="31" r="0.8" class="star"/>
  <circle cx="551" cy="17" r="1" class="star"/>
  <circle cx="620" cy="52" r="0.6" class="star"/>
  <circle cx="693" cy="13" r="0.9" class="star"/>
  <circle cx="750" cy="38" r="1.2" class="star"/>
  <circle cx="812" cy="24" r="0.7" class="star"/>
  <circle cx="865" cy="61" r="1" class="star"/>
  <circle cx="45" cy="240" r="0.8" class="star"/>
  <circle cx="115" cy="255" r="1.1" class="star"/>
  <circle cx="310" cy="248" r="0.7" class="star"/>
  <circle cx="580" cy="261" r="0.9" class="star"/>
  <circle cx="720" cy="244" r="0.6" class="star"/>
  <circle cx="840" cy="252" r="1" class="star"/>
  <circle cx="52" cy="128" r="0.5" class="star"/>
  <circle cx="880" cy="140" r="0.7" class="star"/>
  <circle cx="160" cy="180" r="0.5" class="star"/>
  <circle cx="820" cy="175" r="0.6" class="star"/>

  <!-- Corner marks -->
  <path d="M 10,10 L 10,30 M 10,10 L 30,10" class="corner-mark"/>
  <path d="M 890,10 L 890,30 M 890,10 L 870,10" class="corner-mark"/>
  <path d="M 10,270 L 10,250 M 10,270 L 30,270" class="corner-mark"/>
  <path d="M 890,270 L 890,250 M 890,270 L 870,270" class="corner-mark"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="900" height="26" fill="#00ff08" opacity="0.04"/>
  <text x="20" y="17" class="label">◈ SIGNAL INTERCEPT — CLASS: UNKNOWN ORIGIN — REF: 7X-BURMAN-AJ91789</text>
  <text x="750" y="17" class="label">UTC+05:30</text>

  <!-- Signal bars (right side decoration) -->
  <rect x="855" y="90" width="4" height="10" rx="1" class="signal-bar"/>
  <rect x="863" y="83" width="4" height="17" rx="1" class="signal-bar"/>
  <rect x="871" y="75" width="4" height="25" rx="1" class="signal-bar"/>
  <rect x="879" y="68" width="4" height="32" rx="1" class="signal-bar"/>
  <rect x="887" y="60" width="4" height="40" rx="1" class="signal-bar"/>

  <!-- Status dot -->
  <circle cx="830" cy="100" r="4" class="status-dot"/>
  <text x="840" y="104" class="label">LIVE</text>

  <!-- Main title -->
  <text x="450" y="130" text-anchor="middle" class="title">I-I E l l O</text>

  <!-- Subtitle -->
  <text x="450" y="158" text-anchor="middle" class="subtitle">TRANSMISSION FROM: AYUSH BURMAN</text>

  <!-- Divider -->
  <line x1="120" y1="168" x2="780" y2="168" class="border-line"/>

  <!-- Coordinate row -->
  <text x="200" y="190" class="coord">◈ UNIT  AJ91789</text>
  <text x="450" y="190" text-anchor="middle" class="coord">◈ COORD  AB-27654-CMC-V-TN</text>
  <text x="810" y="190" text-anchor="end" class="coord">◈ SECTOR  7</text>

  <!-- Redacted info blocks -->
  <rect x="200" y="204" width="70" height="9" fill="#003311" rx="1"/>
  <rect x="280" y="204" width="40" height="9" fill="#002208" rx="1"/>
  <text x="340" y="213" class="label" opacity="0.5">██████ EXPLORING ██████</text>
  <rect x="540" y="204" width="50" height="9" fill="#003311" rx="1"/>
  <rect x="600" y="204" width="30" height="9" fill="#002208" rx="1"/>

  <!-- Bottom status bar -->
  <rect x="0" y="254" width="900" height="26" fill="#00ff08" opacity="0.04"/>
  <line x1="0" y1="254" x2="900" y2="254" class="border-line"/>
  <text x="20" y="271" class="label">◈ ORIGIN: TIRUPPUR · EARTH · MILKY WAY</text>
  <text x="380" y="271" class="label">DECRYPTION: PARTIAL</text>
  <text x="680" y="271" class="label">SIGNAL STRENGTH: ████░░  73%</text>
  <text x="878" y="271" class="label blink">█</text>

  <!-- Outer border -->
  <rect x="1" y="1" width="898" height="278" class="border-line" rx="2"/>
</svg>
